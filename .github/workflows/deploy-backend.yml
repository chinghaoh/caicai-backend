name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/caicai-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      - name: Restart Spring Boot
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            source ~/.env
            pkill java || true
            sleep 2
            nohup java -jar /home/ec2-user/caicai-0.0.1-SNAPSHOT.jar > /home/ec2-user/app.log 2>&1 &
            echo "Waiting for startup..."
            sleep 15
            curl -f http://localhost:8080/actuator/health && echo "✓ App is up" || echo "✗ App failed to start"
